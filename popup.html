<!DOCTYPE html>
<html>
<head>
  <title>LinkedIn Outreach</title>
  <style>
    body { width: 300px; padding: 10px; font-family: Arial, sans-serif; }
    textarea, input { width: 100%; margin-bottom: 10px; }
    textarea { height: 100px; }
    button { width: 100%; padding: 5px; margin-bottom: 5px; }
  </style>
</head>
<body>
  <h2>LinkedIn Outreach</h2>
  <input type="password" id="apiKeyInput" placeholder="Enter OpenAI API Key">
  <button id="saveApiKey">Save API Key</button>
  <textarea id="outreachMessage" placeholder="Generated outreach message will appear here..."></textarea>
  <button id="generateButton">Generate Message</button>
  <button id="pasteButton">Paste Message to DM</button>
  <script src="popup.js"></script>
</body>
</html>
