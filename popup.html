<!DOCTYPE html>
<html>
<head>
  <title>LinkedIn Outreach</title>
  <style>
    body {
      width: 340px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      margin: 0;
      background: #f3f6f8;
      color: #000;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
      color: #0a66c2;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h2::before {
      content: "💬";
      font-size: 22px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      margin-bottom: 10px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      background: #fff;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #0a66c2;
    }
    textarea {
      height: 110px;
      resize: vertical;
    }
    button {
      width: 100%;
      padding: 9px;
      margin-bottom: 6px;
      background: #0a66c2;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #084d96; }
    button.secondary {
      background: #fff;
      color: #0a66c2;
      border: 1px solid #0a66c2;
    }
    button.secondary:hover { background: #eaf3fb; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .section { margin-bottom: 14px; }
    .footer {
      font-size: 11px;
      color: #888;
      text-align: center;
      margin-top: 8px;
    }
    .footer a { color: #0a66c2; text-decoration: none; }
    .status {
      font-size: 12px;
      padding: 6px 8px;
      border-radius: 4px;
      margin-bottom: 8px;
      display: none;
    }
    .status.show { display: block; }
    .status.success { background: #e8f5e8; color: #1a7f1a; }
    .status.error { background: #fde8e8; color: #c41a1a; }
  </style>
</head>
<body>
  <h2>LinkedIn Outreach</h2>

  <div class="section">
    <label for="apiKeyInput">OpenAI API Key</label>
    <input type="password" id="apiKeyInput" placeholder="sk-...">
    <button id="saveApiKey" class="secondary">Save Key</button>
  </div>

  <div id="status" class="status"></div>

  <div class="section">
    <label for="outreachMessage">Generated Message</label>
    <textarea id="outreachMessage" placeholder="Open a LinkedIn profile, then click Generate..."></textarea>
    <button id="generateButton">⚡ Generate Message</button>
    <button id="pasteButton" class="secondary">📋 Paste to DM</button>
  </div>

  <div class="footer">
    BYOK · Privacy-first · <a href="https://buzz39.github.io/LinkedIn-Outreach/privacy_policy.html" target="_blank">Privacy</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
